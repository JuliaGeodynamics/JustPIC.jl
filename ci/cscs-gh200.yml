include:
  - remote: 'https://gitlab.com/cscs-ci/recipes/-/raw/master/templates/v2/.ci-ext.yml'

unit_test:
  extends: .uenv-runner-daint-gh200
  image: julia/25.5:v1
  variables:
    WITH_UENV_VIEW: 'juliaup'
    SLURM_JOB_NUM_NODES: 1
    SLURM_NTASKS_PER_NODE: 1
    SLURM_GPUS_PER_TASK: 1
    SLURM_TIMELIMIT: "00:30:00"
  script:
    - export MPICH_GPU_SUPPORT_ENABLED=1
    - export IGG_CUDAAWARE_MPI=1
    - export JULIA_CUDA_USE_COMPAT=false # IGG
    - julia -e 'println("Instantiating project");
                using Pkg;
                Pkg.activate(pwd());
                Pkg.add(name="CUDA");
                using CUDA; CUDA.versioninfo();'
    - julia -e 'println("Running tests");
                using Pkg;
                Pkg.activate(pwd());
                Pkg.test("JustPIC"; test_args=["--backend=CUDA"]);'

ref_test:
  extends: .baremetal-runner-daint-gh200
  variables:
    UENV: julia/25.5:v1
    JULIA_JUSTPIC_BACKEND: "CUDA"
    SLURM_JOB_NUM_NODES: 2
    SLURM_NTASKS_PER_NODE: 4
    SLURM_GPUS_PER_TASK: 1
    SLURM_TIMELIMIT: "00:30:00"
  script:
    - export MPICH_GPU_SUPPORT_ENABLED=1
    - export IGG_CUDAAWARE_MPI=1
    - export JULIA_CUDA_USE_COMPAT=false # IGG
    - echo "Preparing the test environment (single rank)"
    - srun -n 1 --uenv $UENV --view=juliaup julia --project=. -e '
        using Pkg;
        Pkg.instantiate();
        Pkg.add("CUDA");'
    - echo "Running the reference test (multiple ranks)"
    - srun --uenv $UENV --view=juliaup julia --project=. scripts/temperature_advection_MPI_ci.jl
